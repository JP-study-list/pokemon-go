<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IV100 圖鑑</title>
<meta name="description" content="Pokémon GO 傳說寶可夢收集進度追蹤：XXL、XXS、IV100。">
<meta name="color-scheme" content="light dark">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://raw.githubusercontent.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="app" hidden>

  <!-- 頂部列 -->
  <header class="topbar">
    <button class="tool-btn" id="menuBtn" type="button" aria-expanded="true" aria-controls="sidebar">
      <span class="ico-menu" aria-hidden="true"></span>
    </button>

    <h1 class="brand">IV100<span class="brand-sub" id="subtitle"></span></h1>

    <div class="topbar-end">
      <button class="tool-btn" id="themeBtn" type="button">◐</button>
      <input type="search" id="q" autocomplete="off">
    </div>
  </header>

  <div class="shell">

    <!-- 側欄 -->
    <aside class="sidebar" id="sidebar">
      <div class="side-scroll">

        <section class="side-block">
          <h2 class="side-title" id="viewTitle"></h2>
          <div class="views" id="views"></div>
        </section>

        <section class="side-block">
          <h2 class="side-title" id="statsTitle"></h2>
          <div class="stats" id="stats"></div>
        </section>

        <section class="side-block" id="filterBlock">
          <h2 class="side-title" id="filterTitle"></h2>
          <nav class="filters" id="filters"></nav>
        </section>

      </div>

      <div class="side-foot">
        <div class="settings-wrap" id="settingsWrap" hidden>
          <div class="settings-menu" id="settingsMenu"></div>
        </div>
        <button class="tool-btn" id="settingsBtn" type="button"
                aria-expanded="false" aria-controls="settingsWrap">⚙</button>
        <div class="auth-area" id="authArea"></div>
      </div>
    </aside>

    <!-- 主內容 -->
    <main class="content">
      <p class="guest-notice" id="guestNotice" hidden></p>
      <div id="list"></div>
    </main>

  </div>

  <div class="scrim" id="scrim" hidden></div>
</div>

<div class="sheet" id="sheet" aria-hidden="true">
  <div class="panel" id="panel" role="dialog" aria-modal="true"></div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
